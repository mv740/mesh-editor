name: GitHub Pages

# Allow the workflow's GITHUB_TOKEN to push commit(s) (required by peaceiris/actions-gh-pages)
permissions:
  contents: write

# Run after the Release workflow completes successfully on the `main` branch.
on:
  workflow_run:
    workflows: [Release]
    types:
      - completed
  # Allow manual deployment from the Actions tab
  workflow_dispatch:

jobs:
  deploy:
    # Only run when either:
    # - the Release workflow completed successfully for the `main` branch (workflow_run), or
    # - the workflow was manually dispatched for the `main` branch (workflow_dispatch)
    if: ${{ (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build playground project
        run: npm run playground:build

      - name: Deploy playground to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./playground/dist
          publish_branch: gh-pages
          force_orphan: true # Creates fresh branch each time
